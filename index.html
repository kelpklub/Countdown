<!DOCTYPE html>

<head>
    <title>Countdown</title>
    <link rel="stylesheet" href="main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Audiowide&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.png">
    <!-- Favicon icon made by pixel buddha from www.flaticon.com.Check README.md for details. -->


</head>

<body>
    <div id="background">
        <img id="countryflag">
        <img id="agencylogo">
        <div class="mission">
            <p id="details">Details</p>
        </div>
        <div class="countdown">
            <div id="smdh">
                <div id="mdh">
                    <div id="dh">
                        <p id="days">0D </p>
                        <p id="hours">0h </p>
                    </div>
                    <p id="minutes">0m </p>
                </div>

                <p id="seconds">0s </p>
            </div>

        </div>
        <div id="picture"> </div>



    </div>

    <script src="script.js" defer></script>
</body>
