<!DOCTYPE html>

<head>
    <title>Countdown</title>
    <link rel="stylesheet" href="main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Audiowide&display=swap" rel="stylesheet">


</head>

<body>
    <div class="background">

        <div class="mission">
            <p id="details">Details</p>
        </div>
        <div class="countdown">
            <div id="smdh">
                <div id="mdh">
                    <div id="dh">
                        <p id="days">0D </p>
                        <p id="hours">0h </p>
                    </div>
                    <p id="minutes">0m </p>
                </div>

                <p id="seconds">0s </p>
            </div>
        </div>



    </div>

    <script src="script.js" defer></script>
</body>
