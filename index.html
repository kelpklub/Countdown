        <div class="mission">
            <p id="details">Details</p>
        </div>
        <div class="countdown">
            <div id="smdh">
                <div id="mdh">
                    <div id="dh">
                        <p id="days">00D </p>
                        <p id="hours">00h </p>
                    </div>
                    <p id="minutes">00m </p>
                </div>

                <p id="seconds">00s </p>
            </div>

        </div>
        <div id="picture"> </div>



    </div>
    <canvas id="stars"></canvas>
    <script src="script.js" defer></script>
</body>
